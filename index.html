<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Wishes 🎉</title>
<meta property="og:title" content="Birthday Wish Demo - Order ₹199">
  <style>
    body { background: #0a0a0a; color: white; font-family: 'Arial', sans-serif; text-align: center; margin: 0; padding: 20px; }
    h1 { color: #ff0080; text-shadow: 0 0 10px #ff0080; font-size: 32px; }
    input { padding: 12px; font-size: 18px; border: 2px solid #ff0080; border-radius: 8px; background: #1a1a1a; color: white; width: 250px; margin: 10px; }
    button { padding: 12px 25px; font-size: 18px; background: #ff0080; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 0 15px #ff0080; font-weight: bold; }
    .wish-box { margin-top: 50px; font-size: 28px; display: none; animation: fadeIn 1s; }
    .cake { font-size: 80px; margin: 20px 0; animation: bounce 2s infinite; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
  </style>
</head>
<body>
  <h1>🎂 Birthday Wish Generator 🎉</h1>
  <p>Apne dost ka naam daalo aur magic dekho</p>
  <input id="naam" placeholder="Naam yahan likho..." maxlength="20">
  <br>
  <button onclick="wishKaro()">🎊 Wish Karo 🎊</button>
  <div class="wish-box" id="wishBox">
    <div class="cake">🎂</div>
    <h2 id="wishText"></h2>
    <p id="wishMsg"></p>
 <br>
<button onclick="orderNow()" style="background:#25D366; font-size:18px; padding:15px 30px; margin-top:15px;">
  📱 Photo + Gaana wali banwaye ₹199
</button>
  </div>
  <audio id="birthdaySong" src="./birthday.mp3"></audio>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<script>
  function wishKaro() {
    let naam = document.getElementById('naam').value;
    if(naam == ""){ alert("Naam to daal bhai 😅"); return; }
    
    const messages = ["Tum jiyo 1000 saal 🎉","Party hard! Cake mera 😎","God bless you bhai 🔥","Tere jaisa dost kismat se milta hai ❤️"];
    let randomMsg = messages[Math.floor(Math.random() * messages.length)];
    
    document.getElementById('wishText').innerHTML = `Happy Birthday ${naam}! 🥳`;
    document.getElementById('wishMsg').innerHTML = randomMsg;
    document.getElementById('wishBox').style.display = 'block';
    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    document.getElementById('birthdaySong').play();
  }

  function orderNow(){
    let msg = `Bhai Birthday Website chahiye ₹199 wali.

Jiska Birthday hai uska Naam:
Photo: Abhi bhejta hu
Gaana: Konsa lagana hai?`;
    window.open(`https://wa.me/919580173772?text=${encodeURIComponent(msg)}`, '_blank');
  }

  setTimeout(() => {
    alert("Ye Demo version hai. Apni Photo + Gaana wali site ke liye ₹199 me order kare. WhatsApp: 9580173772");
  }, 10000); // 10 sec baad popup aayega
</script>
</body>
</html>
